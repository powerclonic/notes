name: Deploy to Coolify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Quality gate: fail fast if the build is broken.
      # Coolify auto-deploys via GitHub webhook on push to main.
      - name: Build
        run: npm run build
